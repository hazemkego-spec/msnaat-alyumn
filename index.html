<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مصنعات اليُمن</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-bg: #000000; /* أسود زي خلفية اللوجو */
            --gold: #d4a373;    /* ذهبي */
            --red: #e63946;     /* أحمر اللوجو */
            --card-bg: #1a1a1a; /* أسود فاتح للكروت */
            --text-color: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: var(--main-bg); color: var(--text-color); padding-bottom: 120px; /* حل مشكلة اختفاء المنتج الأخير */ }

        header {
            background: linear-gradient(180deg, #1a1a1a 0%, #000000 100%);
            text-align: center;
            padding: 30px 15px;
            border-bottom: 2px solid var(--gold);
        }

        .logo-img { width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--gold); margin-bottom: 10px; object-fit: cover; }

        header h1 { color: var(--gold); font-size: 24px; }

        #app-content { padding: 15px; }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #333;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .item-header { display: flex; justify-content: space-between; align-items: center; }
        .item-name { font-size: 18px; font-weight: bold; color: var(--gold); }
        .item-price { color: var(--red); font-weight: bold; }

        .add-btn {
            width: 100%; background: var(--gold); color: black; border: none;
            padding: 12px; border-radius: 10px; font-weight: bold; margin-top: 15px; cursor: pointer;
        }

        /* تنسيق فورم البيانات */
        .user-info-section { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px dashed var(--gold); }
        .user-info-section input {
            width: 100%; padding: 10px; margin-top: 8px; border-radius: 8px; border: 1px solid #444;
            background: #222; color: white; font-size: 14px;
        }

        .cart-item { border-right: 4px solid var(--red); }
        .note-box { width: 100%; padding: 10px; margin-top: 10px; border-radius: 8px; background: #222; color: white; border: 1px solid #444; }

        .total-card { background: var(--gold); color: black; padding: 20px; border-radius: 15px; text-align: center; margin-top: 20px; }
        .whatsapp-btn { background: #25d366; color: white; display: block; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 15px; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #111; display: flex; height: 70px; border-top: 1px solid var(--gold); z-index: 1000;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: none; background: none; color: #888; }
        .nav-item.active { color: var(--gold); font-weight: bold; }
        .badge { background: var(--red); color: white; width: 18px; height: 18px; border-radius: 50%; font-size: 11px; position: absolute; top: 10px; right: 30%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<header>
    <img src="1000363484.png" alt="مصنعات اليُمن" class="logo-img">
    <h1>مصنعات اليُمن</h1>
    <p style="color: #888;">أصالة الذوق الرفيع</p>
</header>

<main id="app-content"></main>

<nav class="bottom-nav">
    <button class="nav-item active" onclick="changeTab('menu')"><span>📋</span>المنيو</button>
    <button class="nav-item" style="position: relative;" onclick="changeTab('cart')">
        <div id="cart-badge"></div><span>🛒</span>السلة
    </button>
</nav>

<script>
    const menuList = [
        { id: 1, name: "برجر", price: 300 },
        { id: 2, name: "عصب", price: 100 },
        { id: 3, name: "سجق", price: 270 },
        { id: 4, name: "حواوشي", price: 270 },
        { id: 5, name: "كفتة", price: 300 },
        { id: 6, name: "مفروم", price: 300 }
    ];

    let cart = [];
    let activeTab = 'menu';

    // تحميل بيانات العميل المسجلة
    let userData = JSON.parse(localStorage.getItem('msnaat_user')) || { name: "", phone: "", address: "" };

    function updateUI() {
        const content = document.getElementById('app-content');
        document.getElementById('cart-badge').innerHTML = cart.length > 0 ? `<span class="badge">${cart.length}</span>` : '';
        content.innerHTML = activeTab === 'menu' ? renderMenu() : renderCart();
    }

    function changeTab(tab) {
        activeTab = tab;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        updateUI();
        window.scrollTo(0,0);
    }

    function renderMenu() {
        return menuList.map(item => `
            <div class="card">
                <div class="item-header"><span class="item-name">${item.name}</span><span class="item-price">${item.price} ج.م</span></div>
                <button class="add-btn" onclick="addToCart(${item.id})">إضافة للطلب +</button>
            </div>
        `).join('');
    }

    function renderCart() {
        if (cart.length === 0) return `<div style="text-align:center; padding:50px; color:#666;">السلة فارغة</div>`;

        let total = 0;
        const itemsHTML = cart.map((item, index) => {
            total += item.price;
            return `
                <div class="card cart-item">
                    <div style="display:flex; justify-content:space-between;"><b>${item.name}</b><span>${item.price} ج.م</span></div>
                    <textarea class="note-box" placeholder="ملاحظاتك..." oninput="saveNote(${index}, this.value)">${item.note || ''}</textarea>
                    <div style="text-align:left; color:var(--red); font-size:12px; margin-top:10px;" onclick="removeFromCart(${index})">إزالة</div>
                </div>
            `;
        }).join('');

        return `
            <div class="user-info-section">
                <h4 style="color:var(--gold)">بيانات التوصيل (مرة واحدة فقط)</h4>
                <input type="text" id="u-name" placeholder="الاسم بالكامل" value="${userData.name}" oninput="saveUserData()">
                <input type="tel" id="u-phone" placeholder="رقم الموبايل" value="${userData.phone}" oninput="saveUserData()">
                <input type="text" id="u-address" placeholder="العنوان بالتفصيل" value="${userData.address}" oninput="saveUserData()">
            </div>
            ${itemsHTML}
            <div class="total-card">
                <p>إجمالي الحساب</p>
                <h2 style="font-size: 28px;">${total} ج.م</h2>
                <a href="#" class="whatsapp-btn" onclick="sendOrder()">تأكيد الطلب واتساب ✅</a>
            </div>
        `;
    }

    function addToCart(id) {
        cart.push({ ...menuList.find(i => i.id === id), note: "" });
        updateUI();
    }

    function removeFromCart(index) { cart.splice(index, 1); updateUI(); }
    function saveNote(i, val) { cart[i].note = val; }

    function saveUserData() {
        userData = {
            name: document.getElementById('u-name').value,
            phone: document.getElementById('u-phone').value,
            address: document.getElementById('u-address').value
        };
        localStorage.setItem('msnaat_user', JSON.stringify(userData));
    }

    function sendOrder() {
        if(!userData.name || !userData.phone || !userData.address) {
            alert("يرجى إكمال بيانات التوصيل أولاً");
            return;
        }
        const phoneNo = "2010XXXXXXXX"; // ضع رقمك هنا
        let msg = `*طلب جديد من مصنعات اليُمن 🥩*%0A%0A`;
        let total = 0;
        cart.forEach((item, i) => {
            msg += `*${i+1}-* ${item.name} (${item.price} ج.م)%0A`;
            if(item.note) msg += ` 📝 _ملاحظة: ${item.note}_%0A`;
            total += item.price;
        });
        msg += `%0A💰 *الإجمالي: ${total} ج.م*%0A%0A`;
        msg += `👤 *الاسم:* ${userData.name}%0A`;
        msg += `📞 *الموبايل:* ${userData.phone}%0A`;
        msg += `📍 *العنوان:* ${userData.address}`;
        window.open(`https://wa.me/${phoneNo}?text=${msg}`, '_blank');
    }

    updateUI();
</script>
</body>
</html>
