<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="مصنعات اليُمن">
    
    <link rel="icon" type="image/png" href="1000363484.png">
    <link rel="apple-touch-icon" href="1000363484.png">
    <link rel="manifest" href="manifest.json">

    <title>مصنعات اليُمن</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --main-bg: #000000; --gold: #d4a373; --red: #e63946; --card-bg: #1a1a1a; --tab-height: 80px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--main-bg); color: white; padding-bottom: calc(var(--tab-height) + 10px); overflow-x: hidden; }
        
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .loader { width: 35px; height: 35px; border: 3px solid #333; border-top-color: var(--gold); border-radius: 50%; animation: spin 1s infinite linear; margin-top: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        header { background: #000; text-align: center; padding: 20px 10px; border-bottom: 2px solid var(--gold); }
        .logo-img { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--gold); margin-bottom: 8px; }
        header h1 { color: var(--gold); font-size: 22px; font-weight: 900; }

        /* نافذة التثبيت التفصيلية */
        #install-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 3000; justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background: var(--card-bg); border: 1.5px solid var(--gold); border-radius: 20px; padding: 20px; text-align: center; width: 100%; max-width: 380px; }
        .install-title { color: var(--gold); font-size: 18px; font-weight: 900; margin-bottom: 15px; }
        .step-box { background: #222; border-radius: 12px; padding: 10px; margin-bottom: 10px; text-align: right; border-right: 4px solid var(--red); }
        .step-box p { font-size: 13px; line-height: 1.6; }
        .step-box b { color: var(--gold); }
        .close-modal-btn { background: var(--gold); color: black; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }

        /* المنيو مربعات */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
        .menu-card { background: var(--card-bg); border-radius: 15px; padding: 12px; text-align: center; border: 1px solid #333; display: flex; flex-direction: column; justify-content: space-between; }
        .item-name { font-size: 16px; font-weight: 700; color: var(--gold); }
        .item-price { color: var(--red); font-size: 18px; font-weight: 900; margin: 8px 0; }
        .add-btn { background: var(--gold); color: black; border: none; padding: 10px; border-radius: 10px; font-weight: 900; font-size: 14px; }

        /* تصغير بيانات السلة */
        .user-info-section { background: #111; padding: 12px; border-radius: 15px; margin-bottom: 15px; border: 1px dashed var(--gold); }
        .user-info-section input { width: 100%; padding: 10px; margin-top: 8px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; font-size: 14px; outline: none; }
        
        .cart-item { background: var(--card-bg); border-radius: 12px; padding: 10px; margin-bottom: 10px; border-right: 4px solid var(--red); }
        .cart-header { display: flex; justify-content: space-between; align-items: center; font-size: 15px; }
        .cart-note { width: 100%; padding: 8px; margin-top: 8px; border-radius: 6px; background: #222; color: #ccc; border: 1px solid #333; font-size: 12px; height: 40px; }
        .remove-btn { color: var(--red); font-size: 12px; font-weight: bold; margin-top: 8px; display: block; text-align: left; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #111; display: flex; height: var(--tab-height); border-top: 2px solid var(--gold); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: none; background: none; color: #888; font-size: 14px; font-weight: bold; }
        .nav-item.active { color: var(--gold); }
        .badge { background: var(--red); color: white; width: 20px; height: 20px; border-radius: 50%; font-size: 11px; position: absolute; top: 8px; right: 28%; display: flex; align-items: center; justify-content: center; border: 2px solid #111; font-weight: 900; }

        .total-card { background: var(--gold); color: black; padding: 15px; border-radius: 15px; text-align: center; margin-top: 15px; }
        .total-card h2 { font-size: 28px; font-weight: 900; }
        .whatsapp-btn { background: #25d366; color: white; display: block; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: 900; font-size: 18px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="splash">
    <img src="1000363484.png" width="100" style="border-radius: 50%;">
    <div class="loader"></div>
</div>

<div id="install-modal">
    <div class="modal-content">
        <h2 class="install-title">ثبّت تطبيق مصنعات اليُمن 🥩</h2>
        
        <div class="step-box">
            <p><b>لأجهزة الأندرويد:</b></p>
            <p>1- اضغط على زر <b>(3 نقط ⋮)</b> في أعلى المتصفح.</p>
            <p>2- اختر <b>"تثبيت التطبيق"</b> أو <b>"Install App"</b>.</p>
        </div>

        <div class="step-box" style="border-right-color: var(--gold);">
            <p><b>لأجهزة الآيفون:</b></p>
            <p>1- اضغط على زر <b>المشاركة (المربع بسهم)</b> بالأسفل.</p>
            <p>2- اختر <b>"إضافة للشاشة الرئيسية"</b> أو <b>"Add to Home Screen"</b>.</p>
        </div>

        <button class="close-modal-btn" onclick="closeModal()">فهمت، ابدأ الطلب</button>
    </div>
</div>

<header>
    <img src="1000363484.png" alt="مصنعات اليُمن" class="logo-img">
    <h1>مصنعات اليُمن</h1>
    <p style="color: #888; font-size: 11px;">أصالة الذوق الرفيع</p>
</header>

<main id="app-content"></main>

<nav class="bottom-nav">
    <button class="nav-item active" onclick="changeTab('menu')"><span>📋</span>المنيو</button>
    <button class="nav-item" style="position: relative;" onclick="changeTab('cart')">
        <div id="cart-badge"></div><span>🛒</span>السلة
    </button>
</nav>

<script>
    window.addEventListener('load', () => {
        setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 1000);
        // الرسالة تظهر لو الموقع مش مفتوح كأبلكيشن
        if (!window.matchMedia('(display-mode: standalone)').matches) {
            document.getElementById('install-modal').style.display = 'flex';
        }
    });

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    function closeModal() { document.getElementById('install-modal').style.display = 'none'; }

    const menuList = [
        { id: 1, name: "برجر", price: 300 }, { id: 2, name: "عصب", price: 100 },
        { id: 3, name: "سجق", price: 270 }, { id: 4, name: "حواوشي", price: 270 },
        { id: 5, name: "كفتة", price: 300 }, { id: 6, name: "مفروم", price: 300 }
    ];

    let cart = [];
    let activeTab = 'menu';
    let userData = JSON.parse(localStorage.getItem('msnaat_user')) || { name: "", phone: "", address: "" };

    function updateUI() {
        const content = document.getElementById('app-content');
        document.getElementById('cart-badge').innerHTML = cart.length > 0 ? `<div class="badge">${cart.length}</div>` : '';
        if (activeTab === 'menu') {
            content.innerHTML = `<div class="menu-grid">${renderMenu()}</div>`;
        } else {
            content.innerHTML = `<div style="padding:12px;">${renderCart()}</div>`;
        }
    }

    function changeTab(tab) {
        activeTab = tab;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        updateUI();
    }

    function renderMenu() {
        return menuList.map(item => `
            <div class="menu-card">
                <div><div class="item-name">${item.name}</div><div class="item-price">${item.price} ج.م</div></div>
                <button class="add-btn" onclick="addToCart(${item.id})">إضافة +</button>
            </div>
        `).join('');
    }

    function renderCart() {
        if (cart.length === 0) return `<div style="text-align:center; padding:80px 20px; color:#666; font-size:16px;">السلة فارغة</div>`;
        let total = 0;
        const itemsHTML = cart.map((item, index) => {
            total += item.price;
            return `<div class="cart-item">
                <div class="cart-header"><b>${item.name}</b><span>${item.price} ج.م</span></div>
                <textarea class="cart-note" oninput="cart[${index}].note=this.value" placeholder="ملاحظة قصيرة...">${item.note || ''}</textarea>
                <span class="remove-btn" onclick="cart.splice(${index},1); updateUI();">🗑️ حذف الصنف</span>
            </div>`;
        }).join('');

        return `<div class="user-info-section">
            <input type="text" id="u-name" placeholder="الاسم" value="${userData.name}" oninput="saveUserData()">
            <input type="tel" id="u-phone" placeholder="الهاتف" value="${userData.phone}" oninput="saveUserData()">
            <input type="text" id="u-address" placeholder="العنوان" value="${userData.address}" oninput="saveUserData()">
        </div>
        ${itemsHTML}
        <div class="total-card"><p style="font-size:12px;">إجمالي الطلب</p><h2>${total} ج.م</h2><a href="#" class="whatsapp-btn" onclick="sendOrder()">تأكيد الطلب واتساب</a></div>`;
    }

    function addToCart(id) { cart.push({ ...menuList.find(i => i.id === id), note: "" }); updateUI(); }
    function saveUserData() {
        userData = { name: document.getElementById('u-name').value, phone: document.getElementById('u-phone').value, address: document.getElementById('u-address').value };
        localStorage.setItem('msnaat_user', JSON.stringify(userData));
    }

    function sendOrder() {
        if(!userData.name || !userData.phone || !userData.address) { alert("من فضلك أكمل بيانات التوصيل"); return; }
        const phoneNo = "201122947479";
        let msg = `*طلب جديد - مصنعات اليُمن 🥩*%0A%0A`;
        cart.forEach((item, i) => { msg += `*${i+1}-* ${item.name} (${item.price} ج.م)%0A`; if(item.note) msg += `📝 _${item.note}_%0A`; });
        msg += `%0A💰 *الإجمالي: ${cart.reduce((a, b) => a + b.price, 0)} ج.م*%0A%0A👤 *الاسم:* ${userData.name}%0A📍 *العنوان:* ${userData.address}`;
        window.open(`https://wa.me/${phoneNo}?text=${msg}`, '_blank');
    }
    updateUI();
</script>
</body>
</html>
